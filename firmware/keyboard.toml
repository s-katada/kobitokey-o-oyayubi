# kobitokey-o-oyayubi firmware configuration.
#
# Hardware: split keyboard with two XIAO nRF52840 BLE modules (one on each
# thumb-unit PCB). Each side has a 4x5 matrix (15 keys on main-unit + 5 keys
# on thumb-unit, sharing ROW0..ROW3 / COL0..COL4 via the FH12-10S 10-pin FFC).
# Diode direction is col2row (default). Each thumb PCB also carries a PMW3610
# optical trackball sensor (single-wire SDIO).
#
# Pin assignments below are derived from the KiCad schematic at
# thumb-unit-left.kicad_sch. XIAO pins (silk name | XIAO#):
#   D0 (P0_02, pin1)  -> SDIO   (trackball, bidirectional data)
#   D1 (P0_03, pin2)  -> SCLK   (trackball clock)
#   D2 (P0_28, pin3)  -> MOTION (trackball IRQ, active low)
#   D3 (P0_29, pin4)  -> ROW0
#   D4 (P0_04, pin5)  -> ROW1
#   D5 (P0_05, pin6)  -> ROW2
#   D6 (P1_11, pin7)  -> ROW3
#   D7 (P1_12, pin8)  -> COL3
#   D8 (P1_13, pin9)  -> COL2
#   D9 (P1_14, pin10) -> COL1
#   D10(P1_15, pin11) -> COL0
#   NFC2(P0_10)       -> COL4  (back-side pad, NFC disabled in firmware)
#   NFC1(P0_09)       -> NCS   (trackball chip-select, back-side pad)
# The mapping needs final confirmation by opening eeschema and checking wire
# routes visually; update this file if any pin differs.

[keyboard]
name = "kobitokey-o-oyayubi"
product_name = "kobitokey-o-oyayubi"
vendor_id = 0x4b4f
product_id = 0x4259
manufacturer = "s-katada"
chip = "nrf52840"

[layout]
rows = 4
cols = 10
layers = 4
# Layout is a 40-key 4x10 split. Left half occupies cols 0..4, right half 5..9.
# Row 0..2 are the 3x5 main-unit keys on each side, row 3 is the 5 thumb keys.
# Layers: 0 = Base (QWERTY), 1 = Symbol, 2 = Navigation, 3 = System / BT.
keymap = [
    # --- Layer 0: Base (QWERTY) ---
    [
        ["Q",    "W",    "E",    "R",    "T",         "Y",    "U",    "I",    "O",    "P"],
        ["A",    "S",    "D",    "F",    "G",         "H",    "J",    "K",    "L",    "Semicolon"],
        ["Z",    "X",    "C",    "V",    "B",         "N",    "M",    "Comma","Dot",  "Slash"],
        ["LCtrl","LAlt", "LGui", "MO(2)","Space",     "Enter","MO(1)","RShift","RAlt","RCtrl"],
    ],
    # --- Layer 1: Symbol (numbers and shifted symbols) ---
    [
        ["Kc1",  "Kc2",  "Kc3",  "Kc4",  "Kc5",       "Kc6",  "Kc7",  "Kc8",  "Kc9",  "Kc0"],
        ["Minus","Equal","LeftBracket","RightBracket","Backslash",  "Grave","Quote","No","No","No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    # --- Layer 2: Navigation / Function ---
    [
        ["F1",   "F2",   "F3",   "F4",   "F5",        "F6",   "F7",   "F8",   "F9",   "F10"],
        ["Home", "PageUp","PageDown","End","Insert",  "Left", "Down", "Up",   "Right","Delete"],
        ["F11",  "F12",  "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    # --- Layer 3: System / Bluetooth (reach via MO(2)+MO(1) combo / TG future) ---
    [
        ["BT0",  "BT1",  "BT2",  "PREV_BT","NEXT_BT", "CLR_BT","SWITCH","No",  "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
]

[ble]
enabled = true

[split]
connection = "ble"

# Right half = central. Keys occupy cols 5..9 of the unified 4x10 layout.
[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 5

[split.central.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12", "P0_10"]

# Trackball on the right (central) thumb unit.
[[split.central.input_device.pmw3610]]
name = "trackball_r"
id = 0
spi = { instance = "bitbang0", sck = "P0_03", mosi = "P0_02", miso = "P0_02", cs = "P0_09" }
motion = "P0_28"
report_hz = 125
cpi = 800
smart_mode = true

# Left half = peripheral 0. Keys occupy cols 0..4.
[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 0

[split.peripheral.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12", "P0_10"]

# Trackball on the left (peripheral) thumb unit.
[[split.peripheral.input_device.pmw3610]]
name = "trackball_l"
id = 1
spi = { instance = "bitbang0", sck = "P0_03", mosi = "P0_02", miso = "P0_02", cs = "P0_09" }
motion = "P0_28"
report_hz = 125
cpi = 800
smart_mode = true
# Mirror horizontal axis so both trackballs move the cursor the same way.
invert_x = true

[rmk]
split_peripherals_num = 1
