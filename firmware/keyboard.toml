# kobitokey-o-oyayubi firmware configuration.
#
# Hardware: split keyboard with two XIAO nRF52840 BLE modules (one on each
# thumb-unit PCB). Each side has a 4x5 scan matrix covering 15 main-unit
# switches (rows 0..2) and 4 thumb-unit switches on row 3 at COL0..COL3.
# Row 3 x COL4 has no switch wired on the PCB. The thumb unit's fifth
# silk-labeled switch (SW1) is an MSK-12D19 slide switch acting as the
# physical power cutoff, not a matrix key.
# ROW/COL nets are shared between main and thumb boards via the FH12-10S
# 10-pin FFC connector (J1).
# Diode direction is col2row (default). Each thumb PCB also carries a PMW3610
# optical trackball sensor (single-wire SDIO).
#
# Pin assignments below are derived from the KiCad schematic at
# thumb-unit-left.kicad_sch. XIAO pins (silk name | XIAO#):
#   D0 (P0_02, pin1)  -> SDIO   (trackball, bidirectional data)
#   D1 (P0_03, pin2)  -> SCLK   (trackball clock)
#   D2 (P0_28, pin3)  -> MOTION (trackball IRQ, active low)
#   D3 (P0_29, pin4)  -> ROW0
#   D4 (P0_04, pin5)  -> ROW1
#   D5 (P0_05, pin6)  -> ROW2
#   D6 (P1_11, pin7)  -> ROW3
#   D7 (P1_12, pin8)  -> COL3
#   D8 (P1_13, pin9)  -> COL2
#   D9 (P1_14, pin10) -> COL1
#   D10(P1_15, pin11) -> COL0
#   NFC2(P0_10)       -> COL4  (back-side pad, NFC disabled in firmware)
#   NFC1(P0_09)       -> NCS   (trackball chip-select, back-side pad)
# The mapping needs final confirmation by opening eeschema and checking wire
# routes visually; update this file if any pin differs.

[keyboard]
name = "kobitokey-o-oyayubi"
product_name = "kobitokey-o-oyayubi"
vendor_id = 0x4b4f
product_id = 0x4259
manufacturer = "s-katada"
chip = "nrf52840"
usb_enable = true

[layout]
rows = 4
cols = 10
layers = 4
# Layout is a 38-key 4x10 split. Left half occupies cols 0..4, right half 5..9.
# Row 0..2 are the 3x5 main-unit keys on each side; row 3 has 4 thumb keys
# per side on cols 0..3 (left) / 5..8 (right). Cols 4 and 9 of row 3 have
# no switch on the PCB, so the keymap entries there are "No" and never fire.
# Layers: Layer0 = Base QWERTY, Layer1 = symbols/numbers, Layer2 = nav/Fn,
# Layer3 = system (reserved).
keymap = [
    # --- Layer0: Base (QWERTY) ---
    [
        ["Q",    "W",    "E",    "R",    "T",         "Y",    "U",    "I",    "O",    "P"],
        ["A",    "S",    "D",    "F",    "G",         "H",    "J",    "K",    "L",    "Semicolon"],
        ["Z",    "X",    "C",    "V",    "B",         "N",    "M",    "Comma","Dot",  "Slash"],
        ["A",    "B",    "C",    "D",    "No",        "Enter","MO(1)","RShift","RAlt","No"],
    ],
    # --- Layer1: Symbol (numbers and shifted symbols) ---
    [
        ["Kc1",  "Kc2",  "Kc3",  "Kc4",  "Kc5",       "Kc6",  "Kc7",  "Kc8",  "Kc9",  "Kc0"],
        ["Minus","Equal","LeftBracket","RightBracket","Backslash",  "Grave","Quote","No","No","No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    # --- Layer2: Navigation / Function ---
    [
        ["F1",   "F2",   "F3",   "F4",   "F5",        "F6",   "F7",   "F8",   "F9",   "F10"],
        ["Home", "PageUp","PageDown","End","Insert",  "Left", "Down", "Up",   "Right","Delete"],
        ["F11",  "F12",  "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
    # --- Layer3: System (placeholder; RMK does not expose BLE profile keys
    # as standard keycodes, so assign as needed via custom Rust handlers) ---
    [
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["No",   "No",   "No",   "No",   "No",        "No",   "No",   "No",   "No",   "No"],
        ["_",    "_",    "_",    "_",    "_",         "_",    "_",    "_",    "_",    "_"],
    ],
]

[ble]
enabled = true

[split]
connection = "ble"

# Left half = central. Keys occupy cols 0..4 of the unified 4x10 layout.
[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12", "P0_10"]

# Trackball disabled until PMW3610 sensor is soldered.
# [[split.central.input_device.pmw3610]]
# name = "trackball_r"
# spi = { instance = "bitbang0", sck = "P0_03", mosi = "P0_02", miso = "P0_02", cs = "P0_09" }
# motion = "P0_28"
# cpi = 800
# smart_mode = true

# Right half = peripheral 0. Keys occupy cols 5..9.
[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5

[split.peripheral.matrix]
row_pins = ["P0_29", "P0_04", "P0_05", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12", "P0_10"]

# Trackball disabled until PMW3610 sensor is soldered.
# [[split.peripheral.input_device.pmw3610]]
# name = "trackball_l"
# spi = { instance = "bitbang0", sck = "P0_03", mosi = "P0_02", miso = "P0_02", cs = "P0_09" }
# motion = "P0_28"
# cpi = 800
# smart_mode = true
# invert_x = true

[rmk]
split_peripherals_num = 1
