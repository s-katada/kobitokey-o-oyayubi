# Split BLE wireless
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=5

# Sleep / deep sleep (wake on matrix or trackball IRQ)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Pointing (trackball)
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Stack tweak for SPI + input pipeline on nRF52840
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
